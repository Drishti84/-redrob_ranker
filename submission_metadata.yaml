ai_usage_summary: |
  Used Claude for architecture design, scoring formula refinement, and code review.
  All engineering decisions (scoring weights, feature extraction logic, honeypot
  detection heuristics, reasoning generation branching) were made by the human.
  No candidate data was fed to any LLM during ranking.

methodology_summary: |
  Two-phase hybrid ranker. Offline precompute generates sentence embeddings
  (all-MiniLM-L6-v2) for 100K candidates saved as a normalised float32 matrix.
  At ranking time: JD is embedded locally (no network), cosine similarities
  computed via a single matrix multiply (~0.04s), then a weighted 5-component
  scorer (skill match 35%, career quality 25%, behavioral availability 20%,
  semantic fit 15%, education 5%) produces final scores across all 100K in ~1.7s.
  Full sweep eliminates FAISS recall loss. Career quality explicitly penalises
  consulting-only backgrounds and non-AI titles (keyword stuffer penalty 0.40x).
  Honeypot detection filters candidates with impossible career date math,
  expert skills with 0 months used, or 180+ day job overlaps. Runs in ~30s total.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
